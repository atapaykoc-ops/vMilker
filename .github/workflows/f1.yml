name: F1 forward izleyici

on:
  schedule:
    - cron: '7 0,4,8,12,16,20 * * *'   # her 4h bar kapanisindan 7 dk sonra (UTC)
  workflow_dispatch:                    # elle tetikleme

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: F1 tara
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
        run: python f1_watch.py
      - name: Sicili commit et
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add f1_log.json f1_state.json
          git commit -m "F1 izleyici: $(date -u '+%Y-%m-%d %H:%M UTC')" || echo "degisiklik yok"
          git push
