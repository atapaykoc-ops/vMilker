name: Hacim verisi güncelle

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repoyu çek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: pip install ccxt numpy

      - name: Veriyi güncelle
        run: python update.py

      - name: veri.json'u commit et
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add veri.json
          git commit -m "Veri güncellendi" || echo "değişiklik yok"
          git push
